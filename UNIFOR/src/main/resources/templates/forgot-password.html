<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - ChurchTime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #302b63;
            margin-bottom: 8px;
        }
        .logo span { color: #f59e0b; }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 22px;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .description {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="email"]:focus {
            border-color: #302b63;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #302b63, #24243e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(48,43,99,0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #302b63;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Church<span>Time</span></div>
        <p class="subtitle">Gerencie a presença da sua igreja</p>

        <div class="icon">🔑</div>
        <h1>Esqueceu a senha?</h1>
        <p class="description">Informe seu e-mail e enviaremos um código de 6 dígitos para recuperar sua conta.</p>

        <div id="alert" class="alert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Enviar código</button>
        </form>

        <a href="/" class="back-link">← Voltar ao login</a>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const alert = document.getElementById('alert');
        const btn = document.getElementById('submitBtn');

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            alert.style.display = 'none';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });

                if (res.ok) {
                    showAlert('Código enviado! Verifique seu e-mail.', 'success');
                    setTimeout(() => {
                        window.location.href = '/reset-password';
                    }, 2000);
                } else {
                    const data = await res.json();
                    showAlert(data.message || 'Erro ao enviar. Tente novamente.', 'error');
                }
            } catch (err) {
                showAlert('Erro de conexão. Verifique se o servidor está rodando.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Enviar código';
        });
    </script>
</body>
</html>
