<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida - ChurchTime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #302b63;
            margin-bottom: 8px;
        }
        .logo span { color: #f59e0b; }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .description {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #302b63, #24243e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(48,43,99,0.4);
        }
        .success-badge {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Church<span>Time</span></div>
        <p class="subtitle">Gerencie a presença da sua igreja</p>

        <div class="icon">✅</div>
        <div class="success-badge">Senha redefinida com sucesso!</div>
        <h1>Tudo pronto!</h1>
        <p class="description">Sua senha foi alterada com sucesso. Agora você pode fazer login com sua nova senha.</p>

        <a href="/" class="btn">Fazer login</a>
    </div>
</body>
</html>
