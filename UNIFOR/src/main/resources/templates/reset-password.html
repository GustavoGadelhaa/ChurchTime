<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - ChurchTime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #302b63;
            margin-bottom: 8px;
        }
        .logo span { color: #f59e0b; }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 22px;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .description {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #302b63;
        }
        .token-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 12px;
            font-weight: 700;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #302b63, #24243e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(48,43,99,0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #302b63;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .divider span {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Church<span>Time</span></div>
        <p class="subtitle">Gerencie a presença da sua igreja</p>

        <div class="icon">🔐</div>
        <h1>Redefinir Senha</h1>
        <p class="description">Digite o código de 6 dígitos que enviamos ao seu e-mail e crie uma nova senha.</p>

        <div id="alert" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="token">Código de recuperação</label>
                <input type="text" id="token" name="token" class="token-input" maxlength="6" placeholder="000000" required>
            </div>
            <div class="divider"><span>ou</span></div>
            <div class="form-group">
                <label for="newPassword">Nova senha</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar nova senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a senha" required minlength="6">
            </div>
            <button type="submit" class="btn" id="submitBtn">Redefinir senha</button>
        </form>

        <a href="/forgot-password" class="back-link">← Não recebeu o código?</a>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const alert = document.getElementById('alert');
        const btn = document.getElementById('submitBtn');
        const tokenInput = document.getElementById('token');

        tokenInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alert.style.display = 'none';

            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showAlert('As senhas não coincidem.', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Redefinindo...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: tokenInput.value,
                        newPassword: password
                    })
                });

                if (res.ok) {
                    window.location.href = '/password-reset-success';
                } else {
                    const data = await res.json();
                    showAlert(data.message || 'Código inválido ou expirado.', 'error');
                }
            } catch (err) {
                showAlert('Erro de conexão. Verifique se o servidor está rodando.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Redefinir senha';
        });
    </script>
</body>
</html>
