spring:
  application:
    name: church-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/church}
    username: ${DATABASE_USER:church}
    password: ${DATABASE_PASSWORD:church}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

# Chave HS256 em Base64 (mín. 32 bytes decodificados). Gerar: openssl rand -base64 32
security:
  jwt:
    secret-key: ${JWT_SECRET_BASE64:Y2h1cmNoLWp3dC1zZWNyZXQta2V5LTMyLWJ5dGVzISE=}
    expiration-time: ${JWT_EXPIRATION_MS:86400000}

server:
  servlet:
    context-path: /
