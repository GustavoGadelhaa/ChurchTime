spring:
  application:
    name: church-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/church}
    username: ${DATABASE_USER:church}
    password: ${DATABASE_PASSWORD:church}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-please-use-at-least-256-bits-secret-key!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  servlet:
    context-path: /
