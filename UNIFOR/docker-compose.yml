services:
  postgres:
    image: postgres:16-alpine
    container_name: church-postgres
    network_mode: host
    environment:
      POSTGRES_DB: church
      POSTGRES_USER: church
      POSTGRES_PASSWORD: church
    volumes:
      - church_pg_data:/var/lib/postgresql/data

  rabbitmq:
    ports:
      - '5672:5672'
      - '15672:15672'
    image: rabbitmq:3-management-alpine
    container_name: church-rabbitmq
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - church_rabbit_data:/var/lib/rabbitmq

volumes:
  church_pg_data:
  church_rabbit_data: